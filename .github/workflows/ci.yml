name: CI

on: [push, pull_request]

jobs:
  python:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m compileall daemon scripts vendor
      - run: bash -n install.sh uninstall.sh scripts/doctor.sh scripts/smoke-test.sh
      - run: python3 scripts/public-safety-scan.py
      - run: python3 scripts/check-contracts.py
      - run: python3 -m unittest discover tests
      - run: python3 scripts/golden-bench.py --skip-daemon
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./build.sh
